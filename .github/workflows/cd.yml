name: Deploy dbt models

on:
  push:
    branches:
      - staging
      - main

permissions:
  contents: read

jobs:
  dbt-deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache:  'pip'

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Write Snowflake private key
        run: |
          mkdir -p ~/.dbt
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > ~/.dbt/private_key.pem
          chmod 600 ~/.dbt/private_key.pem

      - name: Set dbt target environment
        id: env
        run: |
          case "${{github.ref_name}}" in staging)
            echo "target=staging" >> $GITHUB_OUTPUT
            echo "Deploying to staging environment"
            ;;
            main)
            echo "target=prod" >> $GITHUB_OUTPUT
            echo "Deploying to production environment"
            ;;
            *)
            echo "❌ Error: Deployment not allowed from branch '${{ github.ref_name }}'". 
            echo "Only 'main' and 'staging' are allowed."
            exit 1
            ;;
          esac

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          curriculum_dbt_snowflake:
            target: ${{ steps.env.outputs.target }}
            outputs:
              staging:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                schema: staging
                threads: 4
                private_key_path: /home/runner/.dbt/private_key.pem
              prod:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                schema: prod
                threads: 4
                private_key_path: /home/runner/.dbt/private_key.pem
          EOF

      - name: Install dbt dependencies
        run: dbt deps

      - name: Run dbt build
        run: dbt build --profiles-dir ~/.dbt --target ${{ steps.env.outputs.target }}
