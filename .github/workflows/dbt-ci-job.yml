name: deploy dbt models
on:
  push:
    branches:
      - staging
      - main

jobs:
  dbt-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Write snowflake private key
        run: |
          mkdir -p ~/.dbt
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > ~/.dbt/private_key.pem
          chmod 600 ~/.dbt/private_key.pem

      - name: Set dbt target environment
        id: env
        run: |
          TARGET_BRANCH="${GITHUB_BASE_REF:-$GITHUB_REF_NAME}"
          if [[ "${TARGET_BRANCH}" == "staging" ]]; then
            echo "target=staging" >> $GITHUB_OUTPUT
          else
            echo "target=prod" >> $GITHUB_OUTPUT
          fi

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
curriculum_dbt_snowflake:
  target: ${{ steps.env.outputs.target }}
  outputs:
    staging:
      type: snowflake
      account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      user: ${{ secrets.SNOWFLAKE_USER }}
      role: ${{ secrets.SNOWFLAKE_ROLE }}
      warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      database: ${{ secrets.SNOWFLAKE_DATABASE }}
      schema: staging
      threads: 1
      private_key_path: ~/.dbt/private_key.pem
    prod:
      type: snowflake
      account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      user: ${{ secrets.SNOWFLAKE_USER }}
      role: ${{ secrets.SNOWFLAKE_ROLE }}
      warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      database: ${{ secrets.SNOWFLAKE_DATABASE }}
      schema: prod
      threads: 1
      private_key_path: ~/.dbt/private_key.pem
EOF

      - name: Install dbt dependencies
        run: dbt deps


      - name: Run dbt models
        run: dbt build --profiles-dir ~/.dbt --target ${{ steps.env.outputs.target }}



