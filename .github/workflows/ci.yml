name: dbt CI (pull request validation)

on:
  pull_request:
    branches: [staging, main]

jobs:
  dbt-validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Write Snowflake private key
        run: |
          mkdir -p ~/.dbt
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > ~/.dbt/private_key.pem
          chmod 600 ~/.dbt/private_key.pem

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          curriculum_dbt_snowflake:
            target: staging
            outputs:
              staging:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                schema: staging
                threads: 4
                private_key_path: /home/runner/.dbt/private_key.pem
          EOF

      - name: Install dbt dependencies
        run: dbt deps

      - name: Validate changes 
        run: dbt build --select state:modified+ --target staging
